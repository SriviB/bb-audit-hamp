# platform: linux-64
channels:
  - pytorch
  - nvidia
  - conda-forge
dependencies:
  - python=3.11
  - numpy=1.26
  - matplotlib=3.8
  - scipy=1.11
  - scikit-learn=1.3
  - python-dotenv=1.0
  - tqdm=4.66
  - ruff=0.1
  - mlflow=2.8
  - filelock=3.13
  - jupyterlab=4.0
  - ipywidgets=8.1
  - pip
  - pip:
      - --index-url https://download.pytorch.org/whl/cu124
      - --extra-index-url https://pypi.org/simple
      - torch==2.5.1
      - torchvision==0.20.1

      - torchdata==0.7.1
      - opacus==1.4.0
      - open-clip-torch==3.3.0
      - privacy-estimates
      - statsmodels
      - numpy<2.0
      - databricks-cli<1






